<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MemoryMunch Slack Icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#151E26"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#19C37D"/>
      <stop offset="100%" stop-color="#2EA8FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="none" stroke="#2C3E50" stroke-width="10"/>

  <!-- Memory path -->
  <path
    d="M132 360 C 176 300, 220 320, 256 256 C 292 192, 338 210, 380 152"
    fill="none"
    stroke="url(#path)"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softShadow)"
  />

  <!-- Nodes -->
  <g filter="url(#softShadow)">
    <circle cx="132" cy="360" r="34" fill="#EAF2F8"/>
    <circle cx="256" cy="256" r="38" fill="#19C37D"/>
    <circle cx="380" cy="152" r="32" fill="#2EA8FF"/>
  </g>

  <!-- Inner highlights -->
  <circle cx="120" cy="348" r="8" fill="#FFFFFF" opacity="0.75"/>
  <circle cx="242" cy="242" r="9" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="368" cy="140" r="7" fill="#FFFFFF" opacity="0.5"/>
</svg>
