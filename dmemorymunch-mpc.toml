db_path = ".memorymunch/memory.db"
roots = ["."]
include_globs = ["MEMORY.md", "memory.md", "memory/**/*.md"]
exclude_globs = [
  ".git/**",
  ".pytest_cache/**",
  "node_modules/**",
  ".venv/**",
  "dist/**",
  "build/**",
  ".secrets/**",
  "private/**",
  "**/*password*.md",
  "**/*secret*.md",
  "**/*token*.md",
]
follow_symlinks = false
max_tokens_per_query = 1200
snippet_chars = 200
